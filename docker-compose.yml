services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: economist_portfolio_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - portfolio

  nginx:
    image: nginx:1.27-alpine
    container_name: economist_portfolio_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - portfolio

networks:
  portfolio:
    driver: bridge
